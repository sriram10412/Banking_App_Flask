###############################################################################
# .github/workflows/pipeline.yml  –  Bootstrap only (Option 2)
#
# This workflow ONLY creates AWS infrastructure via Terraform.
# After the CodeBuild project is created, GitHub webhook will automatically
# trigger builds on every push/PR. No manual start-build call needed.
#
# Required GitHub Secrets (Settings -> Secrets and variables -> Actions):
#   AWS_ACCESS_KEY_ID       - IAM user access key
#   AWS_SECRET_ACCESS_KEY   - IAM user secret key
#   AWS_ACCOUNT_ID          - 603196661038
#   AWS_DEFAULT_REGION      - ap-southeast-1
#   TF_STATE_BUCKET         - banking-app-tfstate
#   TF_VAR_DB_PASSWORD      - RDS master password (no /, @, ", spaces)
#   GH_PAT                  - GitHub PAT (repo + admin:repo_hook scopes)
###############################################################################

name: Bootstrap

on:
  push:
    branches: [main, feature/codebuild-setup]
  workflow_dispatch:

permissions:
  issues: write
  contents: read

env:
  TF_VERSION: "1.7.5"

jobs:
  approve-destroy:
    name: Wait for Destroy Approval
    runs-on: ubuntu-latest
    needs: bootstrap
    steps:
      - name: Request manual approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: sriram10412
          minimum-approvals: 1
          issue-title: "Approve Terraform Destroy for prod infrastructure"
          issue-body: |
            Bootstrap job has completed. Review and approve to destroy all AWS infrastructure.
            **Approve** by commenting: `approved`
            **Deny** by commenting: `denied`
          exclude-workflow-initiator-as-approver: false

  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    needs: approve-destroy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="region=${{ secrets.AWS_DEFAULT_REGION }}"

      - name: Release stale Terraform state lock 
        run: |
          aws dynamodb delete-item \
            --table-name banking-app-tfstate-lock \
            --key '{"LockID": {"S": "banking-app-tfstate/prod/terraform.tfstate"}}' \
            --region ${{ secrets.AWS_DEFAULT_REGION }} || true

      - name: Terraform Destroy
        run: |
          terraform destroy \
            -var-file="environments/prod/terraform.tfvars" \
            -auto-approve

  bootstrap:
    name: Bootstrap AWS Resources
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Bootstrap shared resources (S3, DynamoDB, Secrets Manager)
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          DB_PASSWORD: ${{ secrets.TF_VAR_DB_PASSWORD }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: bash bootstrap.sh

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Release stale Terraform state lock
        run: |
          aws dynamodb delete-item \
            --table-name banking-app-tfstate-lock \
            --key '{"LockID": {"S": "banking-app-tfstate/prod/terraform.tfstate"}}' \
            --region ${{ secrets.AWS_DEFAULT_REGION }} || true

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="region=${{ secrets.AWS_DEFAULT_REGION }}"

      - name: Reconcile Terraform state with existing AWS resources
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          set +e  # don't abort on individual import failures
          ENV="prod"
          REGION="${AWS_DEFAULT_REGION}"
          ACCOUNT_ID="${AWS_ACCOUNT_ID}"

          tf_import_if_missing() {
            local addr="$1" id="$2"
            if terraform state show "$addr" &>/dev/null; then
              echo "  ✓ already in state: $addr"
            else
              echo "  → importing: $addr ($id)"
              terraform import \
                -var-file="environments/prod/terraform.tfvars" \
                "$addr" "$id" 2>&1 || echo "  ⚠ skipped (may not exist yet): $addr"
            fi
          }

          echo "=== Reconciling Terraform state ==="

          # ── VPC & networking ──────────────────────────────────────────────
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=${ENV}-banking-vpc" \
            --region "$REGION" \
            --query 'Vpcs[0].VpcId' --output text 2>/dev/null)
          if [ -n "$VPC_ID" ] && [ "$VPC_ID" != "None" ]; then
            tf_import_if_missing "module.vpc.aws_vpc.main" "$VPC_ID"

            IGW_ID=$(aws ec2 describe-internet-gateways \
              --filters "Name=attachment.vpc-id,Values=$VPC_ID" \
              --region "$REGION" \
              --query 'InternetGateways[0].InternetGatewayId' --output text 2>/dev/null)
            [ -n "$IGW_ID" ] && [ "$IGW_ID" != "None" ] && \
              tf_import_if_missing "module.vpc.aws_internet_gateway.main" "$IGW_ID"

            # Public subnets
            PUBLIC_CIDRS=("10.0.1.0/24" "10.0.2.0/24" "10.0.3.0/24")
            for i in 0 1 2; do
              SN_ID=$(aws ec2 describe-subnets \
                --filters "Name=vpc-id,Values=$VPC_ID" "Name=cidrBlock,Values=${PUBLIC_CIDRS[$i]}" \
                --region "$REGION" \
                --query 'Subnets[0].SubnetId' --output text 2>/dev/null)
              [ -n "$SN_ID" ] && [ "$SN_ID" != "None" ] && \
                tf_import_if_missing "module.vpc.aws_subnet.public[$i]" "$SN_ID"
            done

            # Private subnets
            PRIVATE_CIDRS=("10.0.11.0/24" "10.0.12.0/24" "10.0.13.0/24")
            for i in 0 1 2; do
              SN_ID=$(aws ec2 describe-subnets \
                --filters "Name=vpc-id,Values=$VPC_ID" "Name=cidrBlock,Values=${PRIVATE_CIDRS[$i]}" \
                --region "$REGION" \
                --query 'Subnets[0].SubnetId' --output text 2>/dev/null)
              [ -n "$SN_ID" ] && [ "$SN_ID" != "None" ] && \
                tf_import_if_missing "module.vpc.aws_subnet.private[$i]" "$SN_ID"
            done

            # NAT EIP
            EIP_ALLOC=$(aws ec2 describe-addresses \
              --filters "Name=tag:Name,Values=${ENV}-nat-eip-1" \
              --region "$REGION" \
              --query 'Addresses[0].AllocationId' --output text 2>/dev/null)
            [ -n "$EIP_ALLOC" ] && [ "$EIP_ALLOC" != "None" ] && \
              tf_import_if_missing "module.vpc.aws_eip.nat[0]" "$EIP_ALLOC"

            # NAT Gateway
            NGW_ID=$(aws ec2 describe-nat-gateways \
              --filter "Name=vpc-id,Values=$VPC_ID" "Name=state,Values=available" \
              --region "$REGION" \
              --query 'NatGateways[0].NatGatewayId' --output text 2>/dev/null)
            [ -n "$NGW_ID" ] && [ "$NGW_ID" != "None" ] && \
              tf_import_if_missing "module.vpc.aws_nat_gateway.main[0]" "$NGW_ID"

            # Route tables
            PUB_RT=$(aws ec2 describe-route-tables \
              --filters "Name=vpc-id,Values=$VPC_ID" "Name=tag:Name,Values=${ENV}-public-rt" \
              --region "$REGION" \
              --query 'RouteTables[0].RouteTableId' --output text 2>/dev/null)
            [ -n "$PUB_RT" ] && [ "$PUB_RT" != "None" ] && \
              tf_import_if_missing "module.vpc.aws_route_table.public" "$PUB_RT"
          fi

          # ── IAM roles ─────────────────────────────────────────────────────
          tf_import_if_missing "module.vpc.aws_iam_role.flow_logs"              "${ENV}-vpc-flow-logs-role"
          tf_import_if_missing "module.codebuild.aws_iam_role.codebuild"        "${ENV}-banking-codebuild-role"
          tf_import_if_missing "module.iam.aws_iam_role.ecs_task_execution"     "${ENV}-ecs-task-execution-role"
          tf_import_if_missing "module.iam.aws_iam_role.ecs_task"               "${ENV}-ecs-task-role"
          tf_import_if_missing "module.rds.aws_iam_role.rds_monitoring"         "${ENV}-rds-monitoring-role"

          # ── IAM policies (need ARN) ────────────────────────────────────────
          for pair in \
            "module.iam.aws_iam_policy.ecs_secrets:${ENV}-ecs-secrets-policy" \
            "module.iam.aws_iam_policy.ecs_task_app:${ENV}-ecs-task-app-policy"; do
            ADDR="${pair%%:*}"
            POLICY_NAME="${pair##*:}"
            POLICY_ARN=$(aws iam list-policies --scope Local \
              --query "Policies[?PolicyName=='${POLICY_NAME}'].Arn" \
              --output text 2>/dev/null)
            [ -n "$POLICY_ARN" ] && [ "$POLICY_ARN" != "None" ] && \
              tf_import_if_missing "$ADDR" "$POLICY_ARN"
          done

          # ── ECR ───────────────────────────────────────────────────────────
          tf_import_if_missing "module.ecr.aws_ecr_repository.app" "${ENV}-banking-app"

          # ── S3 ALB logs bucket ────────────────────────────────────────────
          tf_import_if_missing "module.alb.aws_s3_bucket.alb_logs" \
            "${ENV}-banking-alb-logs-${ACCOUNT_ID}"

          # ── ALB Target Group ──────────────────────────────────────────────
          TG_ARN=$(aws elbv2 describe-target-groups \
            --names "${ENV}-banking-tg" \
            --region "$REGION" \
            --query 'TargetGroups[0].TargetGroupArn' --output text 2>/dev/null)
          [ -n "$TG_ARN" ] && [ "$TG_ARN" != "None" ] && \
            tf_import_if_missing "module.alb.aws_lb_target_group.app" "$TG_ARN"

          # ── ALB ───────────────────────────────────────────────────────────
          ALB_ARN=$(aws elbv2 describe-load-balancers \
            --names "${ENV}-banking-alb" \
            --region "$REGION" \
            --query 'LoadBalancers[0].LoadBalancerArn' --output text 2>/dev/null)
          [ -n "$ALB_ARN" ] && [ "$ALB_ARN" != "None" ] && \
            tf_import_if_missing "module.alb.aws_lb.main" "$ALB_ARN"

          # ── CloudWatch Log Groups ─────────────────────────────────────────
          tf_import_if_missing "module.monitoring.aws_cloudwatch_log_group.app" \
            "/ecs/${ENV}/banking-app"
          tf_import_if_missing "module.codebuild.aws_cloudwatch_log_group.codebuild" \
            "/codebuild/${ENV}-banking"
          tf_import_if_missing "module.vpc.aws_cloudwatch_log_group.flow_logs" \
            "/aws/vpc/${ENV}-banking-flow-logs"

          # ── RDS ───────────────────────────────────────────────────────────
          tf_import_if_missing "module.rds.aws_kms_alias.rds"          "alias/${ENV}-rds"
          tf_import_if_missing "module.rds.aws_db_subnet_group.main"   "${ENV}-banking-db-subnet-group"
          tf_import_if_missing "module.rds.aws_db_parameter_group.main" "${ENV}-banking-pg14"

          # ── Security Groups ───────────────────────────────────────────────
          if [ -n "$VPC_ID" ] && [ "$VPC_ID" != "None" ]; then
            for pair in \
              "module.security.aws_security_group.alb:${ENV}-alb-sg" \
              "module.security.aws_security_group.ecs:${ENV}-ecs-sg" \
              "module.security.aws_security_group.rds:${ENV}-rds-sg"; do
              ADDR="${pair%%:*}"
              SG_NAME="${pair##*:}"
              SG_ID=$(aws ec2 describe-security-groups \
                --filters "Name=vpc-id,Values=$VPC_ID" "Name=group-name,Values=$SG_NAME" \
                --region "$REGION" \
                --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null)
              [ -n "$SG_ID" ] && [ "$SG_ID" != "None" ] && \
                tf_import_if_missing "$ADDR" "$SG_ID"
            done
          fi

          echo "=== State reconciliation complete ==="

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="environments/prod/terraform.tfvars" \
            -out=tfplan

      - name: Create / update CodeBuild project
        run: |
          terraform apply -auto-approve tfplan

      - name: Verify CodeBuild project created
        run: |
          echo "Checking if CodeBuild project exists..."
          aws codebuild batch-get-projects \
            --names prod-banking-codebuild \
            --region ${{ secrets.AWS_DEFAULT_REGION }} \
            --query 'projects[0].[name,arn]' \
            --output table
          
          if [ $? -eq 0 ]; then
            echo "✓ CodeBuild project verified"
          else
            echo "✗ CodeBuild project not found"
            exit 1
          fi

      - name: Verify GitHub webhook registered
        run: |
          echo "Checking if webhook is registered on GitHub repo..."
          WEBHOOK=$(curl -s \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/hooks" \
            | grep -c "codebuild")
          
          if [ $WEBHOOK -gt 0 ]; then
            echo "✓ GitHub webhook verified"
          else
            echo "⚠️  Webhook not found yet (may take a moment to register)"
          fi

      - name: Summary
        run: |
          echo "=========================================="
          echo "✓ Bootstrap Complete"
          echo "=========================================="
          echo ""
          echo "What happened:"
          echo "  1. AWS infrastructure created via Terraform"
          echo "  2. CodeBuild project: prod-banking-codebuild"
          echo "  3. GitHub webhook registered automatically"
          echo ""
          echo "Next steps:"
          echo "  • Push code to main or feature/codebuild-setup"
          echo "  • GitHub will automatically trigger CodeBuild"
          echo "  • Monitor builds: AWS CodeBuild → Build history"
          echo ""
          echo "View logs: https://console.aws.amazon.com/codesuite/codebuild/projects"
          echo "=========================================="