###############################################################################
# .github/workflows/pipeline.yml  –  Bootstrap + Destroy
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID       - IAM user access key
#   AWS_SECRET_ACCESS_KEY   - IAM user secret key
#   AWS_ACCOUNT_ID          - 603196661038
#   AWS_DEFAULT_REGION      - ap-southeast-1
#   TF_STATE_BUCKET         - banking-app-tfstate
#   TF_VAR_DB_PASSWORD      - RDS master password (no /, @, ", spaces)
#   GH_PAT                  - GitHub PAT (repo + admin:repo_hook scopes)
###############################################################################

name: Bootstrap

on:
  push:
    branches: [main, feature/codebuild-setup]
  workflow_dispatch:

permissions:
  issues: write
  contents: read

env:
  TF_VERSION: "1.7.5"

jobs:
  # ── Bootstrap ────────────────────────────────────────────────────────────────
  bootstrap:
    name: Bootstrap AWS Resources
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Bootstrap shared resources (S3, DynamoDB, Secrets Manager)
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          DB_PASSWORD: ${{ secrets.TF_VAR_DB_PASSWORD }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: bash bootstrap.sh

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Release stale Terraform state lock
        run: |
          aws dynamodb delete-item \
            --table-name banking-app-tfstate-lock \
            --key '{"LockID": {"S": "banking-app-tfstate/prod/terraform.tfstate"}}' \
            --region ${{ secrets.AWS_DEFAULT_REGION }} || true

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="region=${{ secrets.AWS_DEFAULT_REGION }}"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file="environments/prod/terraform.tfvars" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Verify CodeBuild project created
        run: |
          aws codebuild batch-get-projects \
            --names prod-banking-codebuild \
            --region ${{ secrets.AWS_DEFAULT_REGION }} \
            --query 'projects[0].[name,arn]' \
            --output table

      - name: Verify GitHub webhook registered
        run: |
          WEBHOOK=$(curl -s \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/hooks" \
            | grep -c "codebuild")
          if [ "$WEBHOOK" -gt 0 ]; then
            echo "✓ GitHub webhook verified"
          else
            echo "⚠️  Webhook not found yet (may take a moment to register)"
          fi

      - name: Summary
        run: |
          echo "=========================================="
          echo "✓ Bootstrap Complete"
          echo "=========================================="
          echo "  1. AWS infrastructure created via Terraform"
          echo "  2. CodeBuild project: prod-banking-codebuild"
          echo "  3. GitHub webhook registered automatically"
          echo "=========================================="

  # ── Approval gate before destroy ─────────────────────────────────────────────
  approve-destroy:
    name: Wait for Destroy Approval
    runs-on: ubuntu-latest
    needs: bootstrap
    steps:
      - name: Request manual approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: sriram10412
          minimum-approvals: 1
          issue-title: "Approve Terraform Destroy for prod infrastructure"
          issue-body: |
            Bootstrap job has completed. Review and approve to destroy all AWS infrastructure.
            **Approve** by commenting: `approved`
            **Deny** by commenting: `denied`
          exclude-workflow-initiator-as-approver: false

  # ── Destroy ───────────────────────────────────────────────────────────────────
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    needs: approve-destroy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Release stale Terraform state lock
        run: |
          aws dynamodb delete-item \
            --table-name banking-app-tfstate-lock \
            --key '{"LockID": {"S": "banking-app-tfstate/prod/terraform.tfstate"}}' \
            --region ${{ secrets.AWS_DEFAULT_REGION }} || true

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="region=${{ secrets.AWS_DEFAULT_REGION }}"

      - name: Clean up ECS task definitions
        run: |
          REGION="${{ secrets.AWS_DEFAULT_REGION }}"
          FAMILY="prod-banking-app"
          echo "Deregistering and deleting ECS task definitions (family: $FAMILY)..."
          TASK_DEFS=$(aws ecs list-task-definitions \
            --family-prefix "$FAMILY" \
            --region "$REGION" \
            --query 'taskDefinitionArns[]' --output text 2>/dev/null)
          for td_arn in $TASK_DEFS; do
            echo "  deregistering $td_arn"
            aws ecs deregister-task-definition \
              --task-definition "$td_arn" --region "$REGION" > /dev/null 2>&1 || true
            echo "  deleting $td_arn"
            aws ecs delete-task-definitions \
              --task-definitions "$td_arn" --region "$REGION" > /dev/null 2>&1 || true
          done
          echo "ECS task definition cleanup complete."

      - name: Terraform Destroy
        run: |
          terraform destroy \
            -var-file="environments/prod/terraform.tfvars" \
            -auto-approve
