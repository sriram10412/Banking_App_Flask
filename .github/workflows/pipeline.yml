###############################################################################
# .github/workflows/pipeline.yml  –  Banking App CI/CD Pipeline
#
# Required GitHub Secrets (Settings -> Secrets and variables -> Actions):
#   AWS_ACCESS_KEY_ID      - IAM user access key (bootstrap uses this)
#   AWS_SECRET_ACCESS_KEY  - IAM user secret key (bootstrap uses this)
#   AWS_ACCOUNT_ID         - 603196661038
#   AWS_DEFAULT_REGION     - ap-southeast-1
#   AWS_ROLE_ARN           - arn:aws:iam::603196661038:role/prod-github-ci-role
#                            NOTE: Bootstrap creates this role automatically.
#                            On FIRST run use placeholder, update after bootstrap.
#   ECS_CLUSTER_NAME       - prod-banking-cluster
#   ECS_SERVICE_NAME       - prod-banking-service
#   TF_VAR_DB_PASSWORD     - your RDS password
#
# Required GitHub Environments (Settings -> Environments):
#   production  - add yourself as required reviewer (gates terraform-apply)
#   destroy     - add yourself as required reviewer (gates terraform-destroy)
#
# HOW TO RUN - NO LOCAL SETUP NEEDED:
#   1. Add all secrets above in GitHub
#   2. Create production and destroy environments with required reviewers
#   3. Push to main - bootstrap runs automatically and creates everything
#   4. Approve terraform-apply when prompted in GitHub UI
#   5. App URL is printed in smoke-test job logs
###############################################################################

name: Banking App CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:    # allows manual trigger from GitHub UI

env:
  TF_VERSION: "1.7.5"
  TF_ROOT: ${{ github.workspace }}
  TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com
  ECR_REPO: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com/prod-banking-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB: bootstrap
  # Uses static AWS credentials to create OIDC, S3, DynamoDB, IAM role
  # Safe to run every time - skips if all resources already exist
  # ─────────────────────────────────────────────────────────────────────────
  bootstrap:
    name: Bootstrap AWS Resources
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (static keys for bootstrap)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Bootstrap AWS resources
        env:
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          REGION="${AWS_DEFAULT_REGION}"
          ACCOUNT_ID="${AWS_ACCOUNT_ID}"
          ROLE_NAME="prod-github-ci-role"
          GITHUB_REPO="${{ github.repository }}"
          NEEDS_BOOTSTRAP=false

          echo "=== Checking if bootstrap is needed ==="

          # Check OIDC provider
          OIDC=$(aws iam list-open-id-connect-providers \
            --query "OpenIDConnectProviderList[?contains(Arn,'token.actions.githubusercontent.com')].Arn" \
            --output text 2>/dev/null || echo "")
          if [ -z "$OIDC" ]; then
            echo "  OIDC provider missing - bootstrap needed"
            NEEDS_BOOTSTRAP=true
          else
            echo "  OIDC provider exists - OK"
          fi

          # Check IAM role
          ROLE=$(aws iam get-role \
            --role-name ${ROLE_NAME} \
            --query 'Role.RoleName' \
            --output text 2>/dev/null || echo "")
          if [ -z "$ROLE" ]; then
            echo "  IAM role missing - bootstrap needed"
            NEEDS_BOOTSTRAP=true
          else
            echo "  IAM role exists - OK"
          fi

          # Check S3 bucket
          aws s3api head-bucket --bucket banking-app-tfstate 2>/dev/null \
            && echo "  S3 bucket exists - OK" \
            || { echo "  S3 bucket missing - bootstrap needed"; NEEDS_BOOTSTRAP=true; }

          # Check DynamoDB table
          TABLE=$(aws dynamodb describe-table \
            --table-name banking-app-tfstate-lock \
            --query 'Table.TableName' \
            --output text 2>/dev/null || echo "")
          if [ -z "$TABLE" ]; then
            echo "  DynamoDB table missing - bootstrap needed"
            NEEDS_BOOTSTRAP=true
          else
            echo "  DynamoDB table exists - OK"
          fi

          if [ "$NEEDS_BOOTSTRAP" = "false" ]; then
            echo ""
            echo "All bootstrap resources exist - skipping bootstrap"
            aws iam update-role \
              --role-name ${ROLE_NAME} \
              --max-session-duration 7200 2>/dev/null || true
            exit 0
          fi

          echo ""
          echo "=== Running bootstrap ==="

          echo "--- Step 1: GitHub OIDC provider ---"
          GITHUB_THUMBPRINT=$(openssl s_client -servername token.actions.githubusercontent.com \
            -connect token.actions.githubusercontent.com:443 2>/dev/null | \
            openssl x509 -fingerprint -noout 2>/dev/null | \
            sed 's/://g' | awk -F= '{print tolower($2)}' || \
            echo "6938fd4d98bab03faadb97b34396831e3780aea1")

          aws iam create-open-id-connect-provider \
            --url https://token.actions.githubusercontent.com \
            --client-id-list sts.amazonaws.com \
            --thumbprint-list 6938fd4d98bab03faadb97b34396831e3780aea1 2>/dev/null || echo "Already exists"

          echo "--- Step 2: S3 state bucket ---"
          aws s3api create-bucket \
            --bucket banking-app-tfstate \
            --region ${REGION} \
            --create-bucket-configuration LocationConstraint=${REGION} 2>/dev/null || echo "Already exists"

          aws s3api put-bucket-versioning \
            --bucket banking-app-tfstate \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket banking-app-tfstate \
            --server-side-encryption-configuration \
            '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

          echo "--- Step 3: DynamoDB lock table ---"
          aws dynamodb create-table \
            --table-name banking-app-tfstate-lock \
            --attribute-definitions AttributeName=LockID,AttributeType=S \
            --key-schema AttributeName=LockID,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region ${REGION} 2>/dev/null || echo "Already exists"

          echo "--- Step 4: GitHub CI IAM role ---"
          cat > /tmp/trust-policy.json << TRUST
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": {
                  "Federated": "arn:aws:iam::${ACCOUNT_ID}:oidc-provider/token.actions.githubusercontent.com"
                },
                "Action": "sts:AssumeRoleWithWebIdentity",
                "Condition": {
                  "StringEquals": {
                    "token.actions.githubusercontent.com:aud": "sts.amazonaws.com",
                    "token.actions.githubusercontent.com:sub": "repo:${GITHUB_REPO}:ref:refs/heads/main"
                  }
                }
              }
            ]
          }
          TRUST

          aws iam create-role \
            --role-name ${ROLE_NAME} \
            --assume-role-policy-document file:///tmp/trust-policy.json 2>/dev/null || \
          aws iam update-assume-role-policy \
            --role-name ${ROLE_NAME} \
            --policy-document file:///tmp/trust-policy.json

          echo "--- Step 5: Detach old scoped policies ---"
          for POLICY_ARN in $(aws iam list-attached-role-policies \
            --role-name ${ROLE_NAME} \
            --query 'AttachedPolicies[].PolicyArn' \
            --output text 2>/dev/null); do
            if [ "$POLICY_ARN" != "arn:aws:iam::aws:policy/AdministratorAccess" ]; then
              aws iam detach-role-policy \
                --role-name ${ROLE_NAME} \
                --policy-arn ${POLICY_ARN} 2>/dev/null || true
            fi
          done

          echo "--- Step 6: Attach AdministratorAccess ---"
          aws iam attach-role-policy \
            --role-name ${ROLE_NAME} \
            --policy-arn arn:aws:iam::aws:policy/AdministratorAccess 2>/dev/null || echo "Already attached"

          echo "--- Step 7: Set max session duration to 7200 ---"
          aws iam update-role \
            --role-name ${ROLE_NAME} \
            --max-session-duration 7200
          echo "  Max session duration set to 7200 seconds"

          echo ""
          echo "Bootstrap complete!"

          echo "Waiting 15 seconds for IAM role to propagate globally..."
          sleep 15
          echo "IAM propagation wait complete"

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: terraform-plan
  # ─────────────────────────────────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs:
      - bootstrap
      - lint-dockerfile
      - lint-terraform
      - lint-app
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-ci-${{ github.run_id }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Clear stale Terraform state locks
        run: |
          aws dynamodb delete-item --table-name banking-app-tfstate-lock \
            --key '{"LockID":{"S":"banking-app-tfstate/prod/terraform.tfstate-md5"}}' \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" 2>/dev/null || true
          aws dynamodb delete-item --table-name banking-app-tfstate-lock \
            --key '{"LockID":{"S":"banking-app-tfstate/prod/terraform.tfstate"}}' \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" 2>/dev/null || true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: terraform-plugins-${{ hashFiles('**/.terraform.lock.hcl') }}

      - name: Terraform Init
        run: |
          mkdir -p "${TF_PLUGIN_CACHE_DIR}"
          terraform init \
            -backend-config="access_key=${{ env.AWS_ACCESS_KEY_ID }}" \
            -backend-config="secret_key=${{ env.AWS_SECRET_ACCESS_KEY }}" \
            -backend-config="token=${{ env.AWS_SESSION_TOKEN }}" \
            -backend-config="region=${{ secrets.AWS_DEFAULT_REGION }}"

      - name: Terraform Plan
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
        run: |
          set +e
          terraform plan \
            -var-file="${TF_ROOT}/environments/prod/terraform.tfvars" \
            -var="app_image_tag=${{ github.sha }}" \
            -out=tfplan \
            -detailed-exitcode
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 0 ]; then
            echo "No changes detected"
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "Changes detected - plan saved successfully"
          else
            echo "Terraform plan failed"
            exit 1
          fi

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: terraform-apply (manual approval via GitHub Environment)
  # ─────────────────────────────────────────────────────────────────────────
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    environment: production    # ← requires manual approval in GitHub settings
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-ci-${{ github.run_id }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Clear stale Terraform state locks
        run: |
          aws dynamodb delete-item --table-name banking-app-tfstate-lock \
            --key '{"LockID":{"S":"banking-app-tfstate/prod/terraform.tfstate-md5"}}' \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" 2>/dev/null || true
          aws dynamodb delete-item --table-name banking-app-tfstate-lock \
            --key '{"LockID":{"S":"banking-app-tfstate/prod/terraform.tfstate"}}' \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" 2>/dev/null || true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: terraform-plugins-${{ hashFiles('**/.terraform.lock.hcl') }}

      - name: Terraform Init
        run: |
          mkdir -p "${TF_PLUGIN_CACHE_DIR}"
          terraform init \
            -backend-config="access_key=${{ env.AWS_ACCESS_KEY_ID }}" \
            -backend-config="secret_key=${{ env.AWS_SECRET_ACCESS_KEY }}" \
            -backend-config="token=${{ env.AWS_SESSION_TOKEN }}" \
            -backend-config="region=${{ secrets.AWS_DEFAULT_REGION }}"

      - name: Terraform Plan and Apply
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
        run: |
          echo "=== Running fresh terraform plan ==="
          set +e
          terraform plan             -var-file="${TF_ROOT}/environments/prod/terraform.tfvars"             -var="app_image_tag=${{ github.sha }}"             -out=tfplan             -detailed-exitcode
          PLAN_EXIT=$?
          set -e
          if [ $PLAN_EXIT -eq 1 ]; then
            echo "Terraform plan failed"
            exit 1
          fi

          echo "=== Running terraform apply ==="
          set +e
          terraform apply -auto-approve tfplan
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 0 ]; then
            ALB_DNS=$(terraform output -raw alb_dns_name)
            echo "http://${ALB_DNS}" > alb_url.txt
            echo ""
            echo "================================================"
            echo " Infrastructure is live!"
            echo " ALB DNS : http://${ALB_DNS}"
            echo " Health  : http://${ALB_DNS}/health"
            echo "================================================"
            echo "ALB_URL=http://${ALB_DNS}" >> $GITHUB_ENV
          else
            echo "Terraform apply failed with exit code ${EXIT_CODE}"
            exit 1
          fi

      - name: Upload ALB URL artifact
        uses: actions/upload-artifact@v4
        with:
          name: alb-url
          path: alb_url.txt
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: lint-dockerfile
  # ─────────────────────────────────────────────────────────────────────────
  lint-dockerfile:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    needs:
      - bootstrap
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: lint-terraform
  # ─────────────────────────────────────────────────────────────────────────
  lint-terraform:
    name: Lint Terraform
    runs-on: ubuntu-latest
    needs:
      - bootstrap
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format
        run: terraform fmt -recursive

      - name: Terraform Validate
        run: |
          terraform init -backend=false
          terraform validate

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: lint-app
  # ─────────────────────────────────────────────────────────────────────────
  lint-app:
    name: Lint Python App
    runs-on: ubuntu-latest
    needs:
      - bootstrap
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install flake8 black isort --quiet

      - name: Run flake8
        run: flake8 app/ --max-line-length=120

      - name: Run black
        run: black app/

      - name: Run isort
        run: isort app/

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: build-image
  # ─────────────────────────────────────────────────────────────────────────
  build-image:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs:
      - bootstrap
      - terraform-apply
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-ci-${{ github.run_id }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg VCS_REF="${{ github.sha }}" \
            --build-arg VERSION="${{ github.sha }}" \
            --cache-from "${{ env.ECR_REPO }}:latest" \
            --tag "${{ env.ECR_REPO }}:${{ github.sha }}" \
            --tag "${{ env.ECR_REPO }}:latest" \
            .
          docker push "${{ env.ECR_REPO }}:${{ github.sha }}"
          docker push "${{ env.ECR_REPO }}:latest"
          docker inspect --format='{{index .RepoDigests 0}}' \
            "${{ env.ECR_REPO }}:${{ github.sha }}" > image-digest.txt
          echo "Image built and pushed successfully"

      - name: Upload image digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-digest
          path: image-digest.txt
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: test-unit
  # ─────────────────────────────────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs:
      - terraform-apply
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb
      APP_ENV: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Run unit tests
        run: |
          pytest app/tests/unit/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --junitxml=junit-unit.xml || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            junit-unit.xml
            coverage.xml
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: test-integration
  # ─────────────────────────────────────────────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs:
      - terraform-apply
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb
      APP_ENV: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Run integration tests
        run: |
          pytest app/tests/integration/ -v \
            --junitxml=junit-integration.xml || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: junit-integration.xml
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: security-trivy
  # ─────────────────────────────────────────────────────────────────────────
  security-trivy:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: build-image
    permissions:
      id-token: write
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-ci-${{ github.run_id }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REPO }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL
          ignore-unfixed: true
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ env.AWS_SESSION_TOKEN }}

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: security-sast
  # ─────────────────────────────────────────────────────────────────────────
  security-sast:
    name: SAST - Bandit
    runs-on: ubuntu-latest
    needs:
      - terraform-apply
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Bandit
        run: |
          pip install bandit --quiet
          set +e
          bandit -r app/ -f json -o bandit-report.json -ll
          set -e
          echo "SAST scan complete"

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: security-secrets
  # ─────────────────────────────────────────────────────────────────────────
  security-secrets:
    name: Secret Scanning - Gitleaks
    runs-on: ubuntu-latest
    needs:
      - terraform-apply
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: security-terraform
  # ─────────────────────────────────────────────────────────────────────────
  security-terraform:
    name: Terraform Security - tfsec
    runs-on: ubuntu-latest
    needs:
      - terraform-apply
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          soft_fail: true

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: deploy-ecs
  # ─────────────────────────────────────────────────────────────────────────
  deploy-ecs:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs:
      - build-image
      - test-unit
      - test-integration
      - security-trivy
      - security-secrets
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-ci-${{ github.run_id }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Download image digest artifact
        uses: actions/download-artifact@v4
        with:
          name: image-digest

      - name: Download ALB URL artifact
        uses: actions/download-artifact@v4
        with:
          name: alb-url
        continue-on-error: true

      - name: Deploy to ECS
        run: |
          # Read ALB URL from artifact or fetch from AWS
          if [ -f alb_url.txt ]; then
            APP_URL=$(cat alb_url.txt)
            echo "ALB URL from artifact: ${APP_URL}"
          else
            echo "Fetching ALB DNS from AWS..."
            APP_URL="http://$(aws elbv2 describe-load-balancers \
              --names prod-banking-alb \
              --region "${{ secrets.AWS_DEFAULT_REGION }}" \
              --query 'LoadBalancers[0].DNSName' \
              --output text)"
            echo "${APP_URL}" > alb_url.txt
          fi

          IMAGE_TAG="${{ github.sha }}"

          # Verify image exists in ECR
          aws ecr describe-images \
            --repository-name prod-banking-app \
            --image-ids imageTag=${IMAGE_TAG} \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" 2>/dev/null \
            && echo "Image tag ${IMAGE_TAG} found in ECR" \
            || { echo "Falling back to latest..."; IMAGE_TAG="latest"; }

          # Get current task definition
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition prod-banking-app \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" \
            --query 'taskDefinition' \
            --output json)

          # Update image in task definition
          NEW_TASK_DEF=$(echo ${TASK_DEF} | python3 -c "
          import json, sys
          td = json.load(sys.stdin)
          for c in td['containerDefinitions']:
              if c['name'] == 'banking-app':
                  c['image'] = '${{ env.ECR_REPO }}:${IMAGE_TAG}'
          for key in ['taskDefinitionArn','revision','status','requiresAttributes',
                      'placementConstraints','compatibilities','registeredAt','registeredBy']:
              td.pop(key, None)
          print(json.dumps(td))
          ")

          # Register new task definition
          NEW_TASK_ARN=$(aws ecs register-task-definition \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" \
            --cli-input-json "${NEW_TASK_DEF}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "New task definition: ${NEW_TASK_ARN}"

          # Update ECS service
          aws ecs update-service \
            --cluster "${{ secrets.ECS_CLUSTER_NAME }}" \
            --service "${{ secrets.ECS_SERVICE_NAME }}" \
            --task-definition "${NEW_TASK_ARN}" \
            --force-new-deployment \
            --region "${{ secrets.AWS_DEFAULT_REGION }}"

          echo "Waiting for service to stabilize..."
          aws ecs wait services-stable \
            --cluster "${{ secrets.ECS_CLUSTER_NAME }}" \
            --services "${{ secrets.ECS_SERVICE_NAME }}" \
            --region "${{ secrets.AWS_DEFAULT_REGION }}"

          echo ""
          echo "================================================"
          echo " Deployment complete!"
          echo " Image   : ${{ env.ECR_REPO }}:${IMAGE_TAG}"
          echo " App URL : ${APP_URL}"
          echo " Health  : ${APP_URL}/health"
          echo " Docs    : ${APP_URL}/docs"
          echo "================================================"

          echo "${APP_URL}" > alb_url.txt

      - name: Upload ALB URL artifact
        uses: actions/upload-artifact@v4
        with:
          name: alb-url-deploy
          path: alb_url.txt
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: smoke-test
  # ─────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-ecs
    steps:
      - name: Download ALB URL artifact
        uses: actions/download-artifact@v4
        with:
          name: alb-url-deploy

      - name: Run smoke test
        run: |
          APP_URL=$(cat alb_url.txt)
          echo "Testing app at: ${APP_URL}"
          echo "Waiting for ALB to register new tasks..."
          sleep 15
          curl -sf "${APP_URL}/health" | grep -q '"status":"ok"'
          echo ""
          echo "================================================"
          echo " Smoke test passed!"
          echo " App is live and accessible at:"
          echo " ${APP_URL}"
          echo ""
          echo " Available endpoints:"
          echo " GET  ${APP_URL}/health"
          echo " POST ${APP_URL}/accounts"
          echo " GET  ${APP_URL}/accounts/{id}/balance"
          echo " POST ${APP_URL}/accounts/{id}/deposit"
          echo " POST ${APP_URL}/accounts/{id}/withdraw"
          echo " GET  ${APP_URL}/docs"
          echo "================================================"

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: terraform-destroy (manual trigger only via workflow_dispatch)
  # ─────────────────────────────────────────────────────────────────────────
  terraform-destroy:
    name: Destroy All Infrastructure
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: destroy    # ← requires manual approval in GitHub settings
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-ci-${{ github.run_id }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          role-duration-seconds: 7200

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Clear stale locks and init
        run: |
          aws dynamodb delete-item --table-name banking-app-tfstate-lock \
            --key '{"LockID":{"S":"banking-app-tfstate/prod/terraform.tfstate-md5"}}' \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" 2>/dev/null || true
          aws dynamodb delete-item --table-name banking-app-tfstate-lock \
            --key '{"LockID":{"S":"banking-app-tfstate/prod/terraform.tfstate"}}' \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" 2>/dev/null || true
          mkdir -p "${TF_PLUGIN_CACHE_DIR}"
          terraform init \
            -backend-config="access_key=${{ env.AWS_ACCESS_KEY_ID }}" \
            -backend-config="secret_key=${{ env.AWS_SECRET_ACCESS_KEY }}" \
            -backend-config="token=${{ env.AWS_SESSION_TOKEN }}" \
            -backend-config="region=${{ secrets.AWS_DEFAULT_REGION }}"

      - name: Pre-destroy cleanup
        run: |
          echo "=== Pre-destroy cleanup ==="

          # Disable ALB deletion protection
          ALB_ARN=$(aws elbv2 describe-load-balancers \
            --names prod-banking-alb \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" \
            --query 'LoadBalancers[0].LoadBalancerArn' \
            --output text 2>/dev/null || echo "")
          if [ ! -z "$ALB_ARN" ] && [ "$ALB_ARN" != "None" ]; then
            aws elbv2 modify-load-balancer-attributes \
              --load-balancer-arn ${ALB_ARN} \
              --attributes Key=deletion_protection.enabled,Value=false \
              --region "${{ secrets.AWS_DEFAULT_REGION }}" 2>/dev/null || true
            echo "ALB deletion protection disabled"
          fi

          # Disable RDS deletion protection
          aws rds modify-db-instance \
            --db-instance-identifier prod-banking-db \
            --no-deletion-protection \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" 2>/dev/null || echo "RDS not found"

          # Delete existing RDS snapshot
          aws rds delete-db-snapshot \
            --db-snapshot-identifier prod-banking-db-final \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" 2>/dev/null || echo "No snapshot found"
          sleep 30

          # Empty ECR repository
          echo "Emptying ECR repository..."
          IMAGE_IDS=$(aws ecr list-images \
            --repository-name prod-banking-app \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" \
            --query 'imageIds[*]' \
            --output json 2>/dev/null || echo "[]")
          if [ "$IMAGE_IDS" != "[]" ] && [ ! -z "$IMAGE_IDS" ]; then
            aws ecr batch-delete-image \
              --repository-name prod-banking-app \
              --image-ids "${IMAGE_IDS}" \
              --region "${{ secrets.AWS_DEFAULT_REGION }}" 2>/dev/null || true
          fi

          # Delete NAT Gateways
          for NAT in $(aws ec2 describe-nat-gateways \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" \
            --filter "Name=state,Values=available" \
            --query 'NatGateways[*].NatGatewayId' \
            --output text 2>/dev/null); do
            aws ec2 delete-nat-gateway \
              --nat-gateway-id ${NAT} \
              --region "${{ secrets.AWS_DEFAULT_REGION }}" 2>/dev/null || true
          done
          echo "Waiting for NAT Gateways to delete (60s)..."
          sleep 60

          # Release EIPs
          for ALLOC in $(aws ec2 describe-addresses \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" \
            --query 'Addresses[?AssociationId==null].AllocationId' \
            --output text 2>/dev/null); do
            aws ec2 release-address \
              --allocation-id ${ALLOC} \
              --region "${{ secrets.AWS_DEFAULT_REGION }}" 2>/dev/null || true
          done

          # Empty S3 ALB logs bucket
          BUCKET="prod-banking-alb-logs-${{ secrets.AWS_ACCOUNT_ID }}"
          aws s3 rm s3://${BUCKET} --recursive \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" 2>/dev/null || true

      - name: Terraform Destroy
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
        run: |
          set +e
          terraform destroy \
            -var-file="${TF_ROOT}/environments/prod/terraform.tfvars" \
            -auto-approve
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Terraform destroy failed with exit code ${EXIT_CODE}"
            exit 1
          fi

      - name: Destroy bootstrap resources
        run: |
          echo "=== Destroying bootstrap resources ==="

          # Delete GitHub CI IAM role
          aws iam detach-role-policy \
            --role-name prod-github-ci-role \
            --policy-arn arn:aws:iam::aws:policy/AdministratorAccess 2>/dev/null || true
          aws iam delete-role \
            --role-name prod-github-ci-role 2>/dev/null || true
          echo "GitHub CI role deleted"

          # Delete OIDC provider
          aws iam delete-open-id-connect-provider \
            --open-id-connect-provider-arn \
            arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:oidc-provider/token.actions.githubusercontent.com \
            2>/dev/null || true
          echo "OIDC provider deleted"

          # Empty and delete Terraform state S3 bucket
          aws s3 rm s3://banking-app-tfstate --recursive 2>/dev/null || true
          aws s3api delete-bucket \
            --bucket banking-app-tfstate \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" 2>/dev/null || true
          echo "State bucket deleted"

          # Delete DynamoDB lock table
          aws dynamodb delete-table \
            --table-name banking-app-tfstate-lock \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" 2>/dev/null || true
          echo "DynamoDB table deleted"

          echo ""
          echo "================================================"
          echo " All infrastructure destroyed successfully!"
          echo "================================================"