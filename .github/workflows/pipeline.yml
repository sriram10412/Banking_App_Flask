###############################################################################
# .github/workflows/pipeline.yml  –  Banking App CI/CD Pipeline
#
# Required GitHub Secrets (Settings -> Secrets and variables -> Actions):
#   AWS_ACCESS_KEY_ID         - IAM user access key
#   AWS_SECRET_ACCESS_KEY     - IAM user secret key
#   AWS_ACCOUNT_ID            - 842548752774
#   AWS_DEFAULT_REGION        - us-east-1
#   AWS_ROLE_ARN              - arn:aws:iam::842548752774:role/prod-github-ci-role
#   ECS_CLUSTER_NAME          - prod-banking-cluster
#   ECS_SERVICE_NAME          - prod-banking-service
#   TF_VAR_DB_PASSWORD        - RDS master password
#   TF_VAR_GITHUB_TOKEN       - GitHub PAT (repo + admin:repo_hook scopes)
#
# Required GitHub Environments (Settings -> Environments):
#   production  - add yourself as required reviewer (gates terraform-apply)
#   destroy     - add yourself as required reviewer (gates terraform-destroy)
###############################################################################

name: Banking App CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  TF_VERSION: "1.7.5"
  TF_ROOT: ${{ github.workspace }}
  TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com
  ECR_REPO: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com/prod-banking-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB: bootstrap
  # Creates S3, DynamoDB, Secrets Manager, and GitHub OIDC role.
  # Safe to re-run — all steps are idempotent.
  # S3/DynamoDB/Secrets Manager done via bootstrap.sh (shared with CodeBuild).
  # OIDC role is GitHub-Actions-specific so it stays here.
  # ─────────────────────────────────────────────────────────────────────────
  bootstrap:
    name: Bootstrap AWS Resources
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      # Calls the same bootstrap.sh used locally and in CodeBuild.
      # Creates: S3 state bucket, DynamoDB lock table, Secrets Manager secret.
      - name: Bootstrap shared resources (S3, DynamoDB, Secrets Manager)
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
        run: bash bootstrap.sh

      # GitHub OIDC is specific to GitHub Actions — not in bootstrap.sh
      - name: Create GitHub OIDC provider and CI role
        env:
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          ROLE_NAME: prod-github-ci-role
          GITHUB_REPO: ${{ github.repository }}
        run: |
          aws iam create-open-id-connect-provider \
            --url https://token.actions.githubusercontent.com \
            --client-id-list sts.amazonaws.com \
            --thumbprint-list 6938fd4d98bab03faadb97b34396831e3780aea1 2>/dev/null \
            && echo "OIDC provider created" || echo "OIDC provider already exists"

          cat > /tmp/trust-policy.json << EOF
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Principal": {
                "Federated": "arn:aws:iam::${ACCOUNT_ID}:oidc-provider/token.actions.githubusercontent.com"
              },
              "Action": "sts:AssumeRoleWithWebIdentity",
              "Condition": {
                "StringEquals": {
                  "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
                },
                "StringLike": {
                  "token.actions.githubusercontent.com:sub": "repo:${GITHUB_REPO}:*"
                }
              }
            }]
          }
          EOF

          aws iam create-role \
            --role-name ${ROLE_NAME} \
            --assume-role-policy-document file:///tmp/trust-policy.json 2>/dev/null \
            && echo "Role created" \
            || (aws iam update-assume-role-policy \
                  --role-name ${ROLE_NAME} \
                  --policy-document file:///tmp/trust-policy.json \
                && echo "Trust policy updated")

          aws iam attach-role-policy \
            --role-name ${ROLE_NAME} \
            --policy-arn arn:aws:iam::aws:policy/AdministratorAccess 2>/dev/null \
            && echo "AdministratorAccess attached" || echo "Already attached"

          aws iam update-role --role-name ${ROLE_NAME} --max-session-duration 7200

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: lint-dockerfile
  # ─────────────────────────────────────────────────────────────────────────
  lint-dockerfile:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    needs: bootstrap
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: lint-terraform
  # ─────────────────────────────────────────────────────────────────────────
  lint-terraform:
    name: Lint Terraform
    runs-on: ubuntu-latest
    needs: bootstrap
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Format Check
        run: terraform fmt -check -recursive
      - name: Terraform Validate
        run: |
          terraform init -backend=false
          terraform validate

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: lint-app
  # ─────────────────────────────────────────────────────────────────────────
  lint-app:
    name: Lint Python App
    runs-on: ubuntu-latest
    needs: bootstrap
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install linters
        run: pip install flake8 black isort --quiet
      - name: flake8
        run: flake8 app/ --max-line-length=120
      - name: black
        run: black --check app/
      - name: isort
        run: isort --check-only app/

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: terraform-plan
  # ─────────────────────────────────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [bootstrap, lint-dockerfile, lint-terraform, lint-app]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-ci-${{ github.run_id }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Clear stale Terraform state locks
        run: |
          aws dynamodb delete-item --table-name banking-app-tfstate-lock \
            --key '{"LockID":{"S":"bankingpromo1234/prod/terraform.tfstate-md5"}}' \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" 2>/dev/null || true
          aws dynamodb delete-item --table-name banking-app-tfstate-lock \
            --key '{"LockID":{"S":"bankingpromo1234/prod/terraform.tfstate"}}' \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" 2>/dev/null || true

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: terraform-plugins-${{ hashFiles('**/.terraform.lock.hcl') }}

      - name: Terraform Init
        run: |
          mkdir -p "${TF_PLUGIN_CACHE_DIR}"
          terraform init \
            -backend-config="access_key=${{ env.AWS_ACCESS_KEY_ID }}" \
            -backend-config="secret_key=${{ env.AWS_SECRET_ACCESS_KEY }}" \
            -backend-config="token=${{ env.AWS_SESSION_TOKEN }}" \
            -backend-config="region=${{ secrets.AWS_DEFAULT_REGION }}"

      - name: Terraform Plan
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_github_token: ${{ secrets.TF_VAR_GITHUB_TOKEN }}
        run: |
          terraform plan \
            -var-file="${TF_ROOT}/environments/prod/terraform.tfvars" \
            -var="app_image_tag=${{ github.sha }}" \
            -out=tfplan \
            -detailed-exitcode || [ $? -eq 2 ]

      - uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: terraform-apply (manual approval via GitHub Environment)
  # ─────────────────────────────────────────────────────────────────────────
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-ci-${{ github.run_id }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Clear stale Terraform state locks
        run: |
          aws dynamodb delete-item --table-name banking-app-tfstate-lock \
            --key '{"LockID":{"S":"bankingpromo1234/prod/terraform.tfstate-md5"}}' \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" 2>/dev/null || true
          aws dynamodb delete-item --table-name banking-app-tfstate-lock \
            --key '{"LockID":{"S":"bankingpromo1234/prod/terraform.tfstate"}}' \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" 2>/dev/null || true

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: terraform-plugins-${{ hashFiles('**/.terraform.lock.hcl') }}

      - name: Terraform Init
        run: |
          mkdir -p "${TF_PLUGIN_CACHE_DIR}"
          terraform init \
            -backend-config="access_key=${{ env.AWS_ACCESS_KEY_ID }}" \
            -backend-config="secret_key=${{ env.AWS_SECRET_ACCESS_KEY }}" \
            -backend-config="token=${{ env.AWS_SESSION_TOKEN }}" \
            -backend-config="region=${{ secrets.AWS_DEFAULT_REGION }}"

      - name: Terraform Apply
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_github_token: ${{ secrets.TF_VAR_GITHUB_TOKEN }}
        run: |
          terraform apply \
            -var-file="${TF_ROOT}/environments/prod/terraform.tfvars" \
            -var="app_image_tag=${{ github.sha }}" \
            -auto-approve
          ALB_DNS=$(terraform output -raw alb_dns_name)
          echo "http://${ALB_DNS}" > alb_url.txt
          echo "App live at http://${ALB_DNS}"

      - uses: actions/upload-artifact@v4
        with:
          name: alb-url
          path: alb_url.txt
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: build-image
  # ─────────────────────────────────────────────────────────────────────────
  build-image:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [bootstrap, terraform-apply]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-ci-${{ github.run_id }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg VCS_REF="${{ github.sha }}" \
            --build-arg VERSION="${{ github.sha }}" \
            --cache-from "${{ env.ECR_REPO }}:latest" \
            --tag "${{ env.ECR_REPO }}:${{ github.sha }}" \
            --tag "${{ env.ECR_REPO }}:latest" \
            .
          docker push "${{ env.ECR_REPO }}:${{ github.sha }}"
          docker push "${{ env.ECR_REPO }}:latest"
          docker inspect --format='{{index .RepoDigests 0}}' \
            "${{ env.ECR_REPO }}:${{ github.sha }}" > image-digest.txt

      - uses: actions/upload-artifact@v4
        with:
          name: image-digest
          path: image-digest.txt
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: test-unit
  # ─────────────────────────────────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: terraform-apply
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb
      APP_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt --quiet
      - name: Run unit tests
        run: |
          pytest app/tests/unit/ -v \
            --cov=app \
            --cov-report=xml \
            --junitxml=junit-unit.xml || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: [junit-unit.xml, coverage.xml]
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: test-integration
  # ─────────────────────────────────────────────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: terraform-apply
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb
      APP_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt --quiet
      - name: Run integration tests
        run: pytest app/tests/integration/ -v --junitxml=junit-integration.xml || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: junit-integration.xml
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: security-trivy
  # ─────────────────────────────────────────────────────────────────────────
  security-trivy:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: build-image
    permissions:
      id-token: write
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-ci-${{ github.run_id }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REPO }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL
          ignore-unfixed: true
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ env.AWS_SESSION_TOKEN }}
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: security-sast
  # ─────────────────────────────────────────────────────────────────────────
  security-sast:
    name: SAST - Bandit
    runs-on: ubuntu-latest
    needs: terraform-apply
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run Bandit
        run: |
          pip install bandit --quiet
          bandit -r app/ -f json -o bandit-report.json -ll || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: security-secrets
  # ─────────────────────────────────────────────────────────────────────────
  security-secrets:
    name: Secret Scanning - Gitleaks
    runs-on: ubuntu-latest
    needs: terraform-apply
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: security-terraform
  # ─────────────────────────────────────────────────────────────────────────
  security-terraform:
    name: Terraform Security - tfsec
    runs-on: ubuntu-latest
    needs: terraform-apply
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/tfsec-action@v1.0.0
        with:
          soft_fail: true

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: deploy-ecs
  # ─────────────────────────────────────────────────────────────────────────
  deploy-ecs:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [build-image, test-unit, test-integration, security-trivy, security-secrets]
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-ci-${{ github.run_id }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: alb-url
        continue-on-error: true

      - name: Deploy to ECS
        run: |
          APP_URL=$(cat alb_url.txt 2>/dev/null || \
            echo "http://$(aws elbv2 describe-load-balancers \
              --names prod-banking-alb \
              --region "${{ secrets.AWS_DEFAULT_REGION }}" \
              --query LoadBalancers[0].DNSName \
              --output text)")

          IMAGE_TAG="${{ github.sha }}"
          aws ecr describe-images \
            --repository-name prod-banking-app \
            --image-ids imageTag=${IMAGE_TAG} \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" 2>/dev/null \
            || IMAGE_TAG="latest"

          aws ecs describe-task-definition \
            --task-definition prod-banking-app \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" \
            --query taskDefinition --output json > /tmp/taskdef.json

          python3 - <<EOF
          import json
          with open('/tmp/taskdef.json') as f:
              td = json.load(f)
          for c in td['containerDefinitions']:
              if c['name'] == 'banking-app':
                  c['image'] = '${{ env.ECR_REPO }}:${IMAGE_TAG}'
          for k in ['taskDefinitionArn','revision','status','requiresAttributes',
                    'placementConstraints','compatibilities','registeredAt','registeredBy']:
              td.pop(k, None)
          with open('/tmp/newtaskdef.json', 'w') as f:
              json.dump(td, f)
          EOF

          NEW_TASK_ARN=$(aws ecs register-task-definition \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" \
            --cli-input-json file:///tmp/newtaskdef.json \
            --query taskDefinition.taskDefinitionArn \
            --output text)
          echo "Registered: ${NEW_TASK_ARN}"

          aws ecs update-service \
            --cluster "${{ secrets.ECS_CLUSTER_NAME }}" \
            --service "${{ secrets.ECS_SERVICE_NAME }}" \
            --task-definition "${NEW_TASK_ARN}" \
            --force-new-deployment \
            --region "${{ secrets.AWS_DEFAULT_REGION }}"

          aws ecs wait services-stable \
            --cluster "${{ secrets.ECS_CLUSTER_NAME }}" \
            --services "${{ secrets.ECS_SERVICE_NAME }}" \
            --region "${{ secrets.AWS_DEFAULT_REGION }}"

          echo "Deployment complete! App: ${APP_URL}"
          echo "${APP_URL}" > alb_url.txt

      - uses: actions/upload-artifact@v4
        with:
          name: alb-url-deploy
          path: alb_url.txt
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: smoke-test
  # ─────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-ecs
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: alb-url-deploy
      - name: Run smoke test
        run: |
          APP_URL=$(cat alb_url.txt)
          echo "Testing: ${APP_URL}"
          sleep 15
          curl -sf "${APP_URL}/health" | grep -q '"status":"ok"'
          echo "Smoke test passed! App live at ${APP_URL}"

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: terraform-destroy (manual trigger only)
  # ─────────────────────────────────────────────────────────────────────────
  terraform-destroy:
    name: Destroy All Infrastructure
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: destroy
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-ci-${{ github.run_id }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          role-duration-seconds: 7200

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          aws dynamodb delete-item --table-name banking-app-tfstate-lock \
            --key '{"LockID":{"S":"bankingpromo1234/prod/terraform.tfstate"}}' \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" 2>/dev/null || true
          mkdir -p "${TF_PLUGIN_CACHE_DIR}"
          terraform init \
            -backend-config="access_key=${{ env.AWS_ACCESS_KEY_ID }}" \
            -backend-config="secret_key=${{ env.AWS_SECRET_ACCESS_KEY }}" \
            -backend-config="token=${{ env.AWS_SESSION_TOKEN }}" \
            -backend-config="region=${{ secrets.AWS_DEFAULT_REGION }}"

      - name: Pre-destroy cleanup
        env:
          REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          # Disable ALB deletion protection
          ALB_ARN=$(aws elbv2 describe-load-balancers --names prod-banking-alb \
            --region ${REGION} --query LoadBalancers[0].LoadBalancerArn \
            --output text 2>/dev/null || echo "")
          [ -n "$ALB_ARN" ] && [ "$ALB_ARN" != "None" ] && \
            aws elbv2 modify-load-balancer-attributes --load-balancer-arn ${ALB_ARN} \
              --attributes Key=deletion_protection.enabled,Value=false \
              --region ${REGION} 2>/dev/null || true

          # Disable RDS deletion protection
          aws rds modify-db-instance --db-instance-identifier prod-banking-db \
            --no-deletion-protection --region ${REGION} 2>/dev/null || true

          # Empty ECR
          IMAGE_IDS=$(aws ecr list-images --repository-name prod-banking-app \
            --region ${REGION} --query imageIds --output json 2>/dev/null || echo "[]")
          [ "$IMAGE_IDS" != "[]" ] && \
            aws ecr batch-delete-image --repository-name prod-banking-app \
              --image-ids "${IMAGE_IDS}" --region ${REGION} 2>/dev/null || true

          # Delete NAT gateways (they block VPC destroy)
          for NAT in $(aws ec2 describe-nat-gateways --region ${REGION} \
            --filter Name=state,Values=available \
            --query NatGateways[*].NatGatewayId --output text 2>/dev/null); do
            aws ec2 delete-nat-gateway --nat-gateway-id ${NAT} --region ${REGION} || true
          done
          echo "Waiting 60s for NAT gateways to delete..."
          sleep 60

          # Release unattached EIPs
          for ALLOC in $(aws ec2 describe-addresses --region ${REGION} \
            --query 'Addresses[?AssociationId==null].AllocationId' --output text 2>/dev/null); do
            aws ec2 release-address --allocation-id ${ALLOC} --region ${REGION} || true
          done

          # Empty ALB logs bucket
          BUCKET="prod-banking-alb-logs-${ACCOUNT_ID}"
          aws s3 rm s3://${BUCKET} --recursive --region ${REGION} 2>/dev/null || true

      - name: Terraform Destroy
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_github_token: ${{ secrets.TF_VAR_GITHUB_TOKEN }}
        run: |
          terraform destroy \
            -var-file="${TF_ROOT}/environments/prod/terraform.tfvars" \
            -auto-approve

      - name: Destroy bootstrap resources
        env:
          REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          aws iam detach-role-policy --role-name prod-github-ci-role \
            --policy-arn arn:aws:iam::aws:policy/AdministratorAccess 2>/dev/null || true
          aws iam delete-role --role-name prod-github-ci-role 2>/dev/null || true

          aws iam delete-open-id-connect-provider \
            --open-id-connect-provider-arn \
            arn:aws:iam::${ACCOUNT_ID}:oidc-provider/token.actions.githubusercontent.com \
            2>/dev/null || true

          aws s3 rm s3://bankingpromo1234 --recursive 2>/dev/null || true
          aws s3api delete-bucket --bucket bankingpromo1234 \
            --region ${REGION} 2>/dev/null || true

          aws dynamodb delete-table --table-name banking-app-tfstate-lock \
            --region ${REGION} 2>/dev/null || true

          aws secretsmanager delete-secret \
            --secret-id prod/banking-app/db-master-password \
            --force-delete-without-recovery --region ${REGION} 2>/dev/null || true
          aws secretsmanager delete-secret \
            --secret-id prod/banking-app/github-token \
            --force-delete-without-recovery --region ${REGION} 2>/dev/null || true

          echo "All infrastructure destroyed!"
