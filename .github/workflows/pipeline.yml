###############################################################################
# .github/workflows/pipeline.yml  –  Bootstrap only
#
# Runs once (or on every push) to ensure AWS prerequisites exist and the
# CodeBuild project is up-to-date. CodeBuild handles all CI/CD after this.
#
# Required GitHub Secrets (Settings -> Secrets and variables -> Actions):
#   AWS_ACCESS_KEY_ID       - IAM user access key
#   AWS_SECRET_ACCESS_KEY   - IAM user secret key
#   AWS_ACCOUNT_ID          - 603196661038
#   AWS_DEFAULT_REGION      - ap-southeast-1
#   TF_STATE_BUCKET         - banking-app-tfstate
#   TF_VAR_DB_PASSWORD      - RDS master password
#   GH_PAT                  - GitHub PAT (repo + admin:repo_hook scopes)
###############################################################################

name: Bootstrap

on:
  push:
    branches: [main, feature/codebuild-setup]
  workflow_dispatch:

env:
  TF_VERSION: "1.7.5"

jobs:
  bootstrap:
    name: Bootstrap AWS Resources
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Bootstrap shared resources (S3, DynamoDB, Secrets Manager)
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          DB_PASSWORD: ${{ secrets.TF_VAR_DB_PASSWORD }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: bash bootstrap.sh

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="region=${{ secrets.AWS_DEFAULT_REGION }}"

      - name: Create / update CodeBuild project
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_github_token: ${{ secrets.GH_PAT }}
        run: |
          terraform apply \
            -var-file="environments/prod/terraform.tfvars" \
            -target=module.codebuild \
            -auto-approve
