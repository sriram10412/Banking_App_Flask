version: 0.2
env:
  variables:
    TF_VERSION: "1.7.5"
    AWS_DEFAULT_REGION: "ap-southeast-1"
    AWS_ACCOUNT_ID: "603196661038"
phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - wget -q https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip
      - unzip -q terraform_${TF_VERSION}_linux_amd64.zip
      - mv terraform /usr/local/bin/
      - pip install -q -r requirements.txt
      - yum install -y jq
  pre_build:
    commands:
      - aws ecr get-login-password --region ${AWS_DEFAULT_REGION} | docker login --username AWS --password-stdin ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com
      - IMAGE_TAG=${CODEBUILD_RESOLVED_SOURCE_VERSION}
      - IMAGE_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com/prod-banking-app:${IMAGE_TAG}
  build:
    commands:
      - echo "Running terraform init..."
      - terraform init -backend-config="region=${AWS_DEFAULT_REGION}" -upgrade
      - echo "Running terraform validate..."
      - terraform validate
      - echo "Running terraform plan..."
      - terraform plan -var-file="environments/prod/terraform.tfvars" -var="app_image_tag=${IMAGE_TAG}" -out=tfplan || (echo "TERRAFORM PLAN FAILED - See errors above" && exit 1)
      - echo "Running terraform apply..."
      - terraform apply -auto-approve tfplan || (echo "TERRAFORM APPLY FAILED - See errors above" && exit 1)
      - echo "Building Docker image..."
      - docker build -t ${IMAGE_URI} -t ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com/prod-banking-app:latest .
      - echo "Pushing Docker image..."
      - docker push ${IMAGE_URI}
      - docker push ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com/prod-banking-app:latest
  post_build:
    commands:
      - echo "Skipping ECS deployment until Terraform succeeds"
      - echo "First, fix the Terraform errors shown above"
artifacts:
  files:
    - tfplan